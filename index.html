<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Delight Media</title>
    <style>
        /* This section makes the magic happen */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }

        body {
            /* Your Blue, Red, and Dark Blue Gradient */
            background: linear-gradient(135deg, #001f3f 0%, #d32f2f 50%, #00008b 100%);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        header { text-align: center; padding: 30px 0; }
        
        .logo-placeholder {
            width: 70px; height: 70px; border: 2px solid white;
            border-radius: 50%; margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; background: rgba(0,0,0,0.4);
        }

        /* The Four Layers Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .column {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 { border-bottom: 2px solid #fff; margin-bottom: 15px; padding-bottom: 5px; }
        
        .content-box {
            background: rgba(0, 0, 0, 0.3);
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
        }

        .label { color: #ff9999; font-weight: bold; font-size: 0.8rem; margin-bottom: 5px; }

        .placeholder {
            height: 80px; background: #222; border-radius: 5px;
            display: flex; align-items: center; justify-content: center; color: #666;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-placeholder">LOGO</div>
        <h1>New Delight Media</h1>
    </header>

    <main class="grid-container">
        <section class="column">
            <h2>Sport</h2>
            <div class="content-box">
                <p class="label">Video & Articles</p>
                <div class="placeholder">Video Player</div>
            </div>
            <div class="content-box">
                <p class="label">Design</p>
                <div class="placeholder">Sport Graphics</div>
            </div>
        </section>

        <section class="column">
            <h2>News</h2>
            <div class="content-box">
                <p class="label">Latest Articles</p>
                <ul style="padding-left: 20px;">
                    <li>Breaking Headlines</li>
                    <li>Global Updates</li>
                </ul>
            </div>
        </section>

        <section class="column">
            <h2>Articles</h2>
            <div class="content-box">
                <p class="label">Featured Reads</p>
                <p>Detailed content goes here...</p>
            </div>
        </section>

        <section class="column">
            <h2>My Design</h2>
            <div class="content-box">
                <p class="label">Graphic Design</p>
                <div class="placeholder">Portfolio</div>
            </div>
            <div class="content-box">
                <p class="label">Video Graphics</p>
                <div class="placeholder">Motion Graphics</div>
            </div>
        </section>
    </main>

</body>
</html>
